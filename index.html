<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0A0E14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="description" content="G-CITY — Gadgets y accesorios tecnológicos. Envíos a Colombia, México y USA."/>
<title>G-CITY — Gadgets & Accesorios</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/views/tienda.css"/>
<link rel="stylesheet" href="css/views/producto.css"/>
<link rel="stylesheet" href="css/views/carrito.css"/>
<link rel="stylesheet" href="css/views/cuenta.css"/>
<link rel="stylesheet" href="css/views/admin.css"/>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo-area">
      <div class="logo-mark">
        <img src="assets/logo-gcity.jpg" alt="G-CITY" class="logo-img"/>
      </div>
      <div class="logo-name">G-<span>CITY</span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="header-search-toggle"
              onclick="GCityTienda.toggleSearch()">
        <i data-lucide="search"></i>
      </button>
      <button class="icon-btn" onclick="switchTab('carrito')">
        <i data-lucide="shopping-bag"></i>
        <span class="cart-badge-header" id="cart-badge-header"
              style="display:none">0</span>
      </button>
    </div>
  </div>
</header>

<main class="main">
  <!-- Vistas se cargan aquí dinámicamente desde /views/*.html -->
</main>

<nav class="bottom-nav">
  <div class="nav-item active" id="nav-tienda" onclick="switchTab('tienda')">
    <div class="nav-icon"><i data-lucide="store"></i></div>
    <div class="nav-label">Tienda</div>
  </div>
  <div class="nav-item" id="nav-carrito" onclick="switchTab('carrito')">
    <div class="nav-icon">
      <i data-lucide="shopping-cart"></i>
      <span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </div>
    <div class="nav-label">Carrito</div>
  </div>
  <div class="nav-item" id="nav-cuenta" onclick="switchTab('cuenta')">
    <div class="nav-icon"><i data-lucide="user"></i></div>
    <div class="nav-label">Cuenta</div>
  </div>
  <div class="nav-item" id="nav-admin" onclick="switchTab('admin')" style="display:none">
    <div class="nav-icon"><i data-lucide="settings"></i></div>
    <div class="nav-label">Admin</div>
  </div>
</nav>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/marketplace.js"></script>
<script src="js/enrichment.js"></script>
<script src="js/tienda.js"></script>
<script src="js/carrito.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</body>
</html>
